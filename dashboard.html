<!DOCTYPE html>
<html>
<head>
    <title>My Meetings - GroupSync</title>
    <script type="module" src="dashboard.js"></script>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body class="dashboard-page">

    <div class="navbar">
        Wangmai
    </div>

    <div class="container">

        <div class="header">
            <h1>My Meetings</h1>
                <button class="create-btn" onclick="window.location.href='createmeetingP.html'">
                    + Create New Meeting
                </button>
                <button id="logoutBtn" class="btn-logout">log out</button>

        </div>

        <div class="stats-card">
            <p>Active Meetings</p>
            <h2 id="activeCount">0</h2>
        </div>

        <div id="meetingsContainer">
             <div class="empty-state">
                <p>Loading your meetings...</p>
            </div>
        </div>
        
        <section class="meeting-section">
            <h2 class="section-title"> รอสรุปผล / กำลังโหวต</h2>
            <div id="activeMeetings" class="meeting-grid">
                </div>
        </section>
        
        <div class="spacer"></div> <section class="meeting-section">
            <h2 class="section-title"> โหวตเสร็จสิ้นแล้ว</h2>
            <div id="completedMeetings" class="meeting-grid">
                </div>
        </section>

    </div>

</body>
</html>
